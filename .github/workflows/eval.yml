name: AI Evaluation Quality Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  evaluate:
    runs-on: ubuntu-latest
    env:
      PYTHONIOENCODING: utf-8
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: pip install pytest
      - name: Run unit tests
        run: python -m pytest tests/ -v
      - name: Run benchmark
        run: python scripts/run_benchmark_demo.py
      - name: Upload benchmark report
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-summary
          path: reports/benchmark_summary.json
      - name: Eval quality gate
        run: python scripts/eval_gate.py
